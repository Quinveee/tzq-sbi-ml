defaults:
  - exp: ???
  - dataset: ???
  - model: noop # Not necessarily needed if exp=histos
  - launcher: local
  - preprocessing: _base
  - _self_

# Default parameters, are overridden by model specific parameters
train:
  lr: 2e-4 # used in original LGATr paper
  epochs: 30
  dropout: 0.10
  lr_warmup: 5
  lr_min: 2e-5
  lr_restart_period: 25
  lr_restart_mult: 2
  weight_decay: 1e-5
  batch_size: 512
  clip_grad_norm: 5
  validation_split: 0.2
  clamp_samples: null
  val_smoothing: 1 # moving-avg window over val loss (epochs)
  val_calibration_weight: 0.0 # λ on calibration error (ratio experiments only)

devices:
  device: gpu
  pin_memory: true
  non_blocking: true
  dtype: float32 # also can be float16
  eval: gpu # specially for histo filling 

modes:
  train: true
  eval: true
  plot: true
  recycle: false
  wandb: false

data:
  run: 1
  ckpts: checkpoints.pt
  run_dir_base: run_dirs
  run_dir: ${.run_dir_base}/${dataset.key}/${exp.key}/${model.key}/${.run}
  model: null  # For preprocessing: which model to use (MIParT or ParT)
  met: true  # Whether source data contains MET features
  preprocessed: false  # Whether to use preprocessed high-level features (hlvl)
  n_preprocessed_features: 14  # Number of preprocessed features (10 high-level + 4 jet scores)
