_target_: launchers.htc.launch
_partial_: true

description:
  executable: scripts/run.sh
  arguments: '$(tarball_name)'
  transfer_input_files: '$(tarball)'
  request_cpus: 4
  request_memory: 32GB
  # This below will allow us to use the same Python interpreter we are using in the Acess Point in the
  # Working Node. Also, we modify the PYTHONPATH to make our files accesible from Python code from the 
  # Working Node. See `scripts/run.sh`
  environment: ENV=${env:prefix};PYTHONPATH=${env:cwd}
  output: logs/$(Cluster).$(Process).out
  log: logs/$(Cluster).$(Process).log
  error: logs/$(Cluster).$(Process).err
  request_disk: 1GB
  should_transfer_files: YES
  when_to_transfer_output: ON_EXIT_OR_EVICT
  transfer_output_files: ${data.run_dir_base}
  request_gpus: 1
  requirements: 'regexp("V100", TARGET.GPUs_DeviceName)'
  getenv: True

# there are 3 job categories: 
# express - 10 minutes
# short - 4 hours
# medium - 22-24 hours
# long - 96 hours
description_addition:
  +UseOS: '"el9"'
  +JobCategory: '"short"'
