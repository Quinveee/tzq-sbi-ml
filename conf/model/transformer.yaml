defaults:
  - _base
  - _self_

key: transformer
input_level: particles # particles|features
# θ conditioning strategy for parametrized experiments:
#   channels → concat θ (and preprocessed / MET) onto every particle token (adds theta_dim channels to dim_in)
#   tokens   → prepend theta_dim dedicated θ tokens per event (same dim_in)
# Has no effect on the local/non-parametrized transformer. LLoCa requires 'channels'.
mode: channels # channels|tokens

LLoCa:
  active: false # whether to make the data lorentz equivariant
  LLoCa_frames: 5 # retained for backwards compatibility (unused by learnable frame path)
  LLoCa_num_scalars: 3
  LLoCa_num_vectors: 2
  LLoCa_frame_hidden: 128
  LLoCa_frame_layers: 2
  LLoCa_eps: 1e-8
  LLoCa_use_float64: true
  # Clamp γ of predicted boosts. Without this the frame predictor can emit
  # arbitrarily-boosted frames for near-lightlike events and the loss spikes.
  # Soft clamp (hardness=4) keeps gradients smooth at the cap.
  LLoCa_gamma_max: 10.0
  LLoCa_gamma_hardness: 4.0

net:
  _target_: models.transformer.Transformer
  dim_in: ... # Dynamically derived
  dim_out: ... # Dynamically derived
  emb_factor: 20
  num_blocks: 8
  dropout_p: ${train.dropout}
  attention:
    num_heads: 8
    increase_hidden_channels: 8
  mlp:
    k_factor: 2
    activation: relu
