defaults:
  - _base
  - _self_

key: cnf

# LGATr encoder (same structure as conf/model/lgatr.yaml but with a modest
# default output-channel count so token_dim stays manageable).
net:
  _target_: lgatr.LGATr
  in_mv_channels: 1
  out_mv_channels: 4
  num_blocks: 6
  in_s_channels: 0
  out_s_channels: 8
  hidden_mv_channels: 8
  hidden_s_channels: 16
  dropout_prob: ${train.dropout}
  attention:
    num_heads: 8
  mlp: {}

# Per-token feature dim after flattening LGATr output.
# Derived as: out_mv_channels * 16 + out_s_channels.
# (Assumes the default multivector layout with 16 components per channel.)
token_dim: ${sum:${prod:${.net.out_mv_channels},16},${.net.out_s_channels}}

# Event-level latent dim that the flow models
pool_dim: 16

# Theta dim (set from dataset)
theta_dim: ${dataset.theta_dim}

flow:
  _target_: models.cnf.ConditionalRealNVP
  # dim and context_dim are filled in by the wrapper (pool_dim / theta_dim)
  n_flows: 8
  hidden_dim: 128
  n_hidden: 2

train:
  lr: 2e-4
  epochs: 1
  dropout: 0.2
  lr_warmup: 0
  lr_min: 1e-2
  batch_size: 256
  clip_grad_norm: 1
  validation_split: 0.2
  clamp_samples: null

# Delay instantiation of nested configs so the wrapper can control it
_recursive_: false
